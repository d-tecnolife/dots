# wallust template - colors-yazi
# Auto-generated yazi theme matching wallpaper colors

[manager]
cwd = { fg = "#435564" }

# Hovered
hovered         = { fg = "#46484A", bg = "#435564" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#6A7F8E", bold = true, italic = true, underline = true }
find_position = { fg = "#4C5358", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#7B8287", bg = "#7B8287" }
marker_cut      = { fg = "#ABB1B6", bg = "#ABB1B6" }
marker_marked   = { fg = "#1C242A", bg = "#1C242A" }
marker_selected = { fg = "#6A7F8E", bg = "#6A7F8E" }

# Tab
tab_active   = { fg = "#46484A", bg = "#435564" }
tab_inactive = { fg = "#F6F8FA", bg = "#A3A6A8" }
tab_width    = 1

# Count
count_copied   = { fg = "#46484A", bg = "#7B8287" }
count_cut      = { fg = "#46484A", bg = "#ABB1B6" }
count_selected = { fg = "#46484A", bg = "#6A7F8E" }

# Border
border_symbol = "│"
border_style  = { fg = "#A3A6A8" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#A3A6A8", bg = "#A3A6A8" }

# Mode
mode_normal = { fg = "#46484A", bg = "#435564", bold = true }
mode_select = { fg = "#46484A", bg = "#7B8287", bold = true }
mode_unset  = { fg = "#46484A", bg = "#4C5358", bold = true }

# Progress
progress_label  = { fg = "#F6F8FA", bold = true }
progress_normal = { fg = "#435564", bg = "#A3A6A8" }
progress_error  = { fg = "#ABB1B6", bg = "#A3A6A8" }

# Permissions
permissions_t = { fg = "#435564" }
permissions_r = { fg = "#6A7F8E" }
permissions_w = { fg = "#ABB1B6" }
permissions_x = { fg = "#7B8287" }
permissions_s = { fg = "#4C5358" }

[input]
border   = { fg = "#435564" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#435564" }
active   = { fg = "#4C5358", bold = true }
inactive = {}

[confirm]
border     = { fg = "#435564" }
title      = { fg = "#435564" }
content    = {}
list       = {}
btn_yes    = { bg = "#7B8287" }
btn_no     = { bg = "#ABB1B6" }
btn_labels = [" [Y]es ", " [N]o "]

[completion]
border   = { fg = "#435564" }
active   = { fg = "#4C5358", bold = true }
inactive = {}
icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#435564" }
title   = {}
hovered = { fg = "#4C5358", underline = true }

[which]
cols = 3
mask            = { bg = "#A3A6A8" }
cand            = { fg = "#1C242A" }
rest            = { fg = "#A3A6A8" }
desc            = { fg = "#4C5358" }
separator       = "  "
separator_style = { fg = "#A3A6A8" }

[help]
on      = { fg = "#435564" }
run     = { fg = "#4C5358" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#A3A6A8", bg = "#090C0F" }

[notify]
title_info  = { fg = "#7B8287" }
title_warn  = { fg = "#6A7F8E" }
title_error = { fg = "#ABB1B6" }

[filetype]
rules = [
    # Images
    { mime = "image/*", fg = "#1C242A" },
    # Media
    { mime = "{audio,video}/*", fg = "#4C5358" },
    # Archives
    { mime = "application/*zip", fg = "#ABB1B6" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#ABB1B6" },
    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#6A7F8E" },
    # Fallback
    { name = "*", fg = "#F6F8FA" },
    { name = "*/", fg = "#435564" },
]
